[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "swarph-cli"
version = "0.7.0a3"
description = "The `swarph` binary — multi-LLM CLI with mesh-gateway integration. v0.7.0a3 (development) adds `swarph install-hook` + `swarph hook-output` for SessionStart memory-injection (substrate-doc R7 §11.1.7.1 #1) — closes the bare-claude operator-paste gap PR-A/PR-B left open. v0.7.0 final ships when swarph-shared cell.yaml relocation (PR-D) also lands."
readme = "README.md"
license = { text = "MIT" }
requires-python = ">=3.10"
authors = [
    { name = "Pierre Samson" },
    { name = "Claude Opus" },
]
keywords = ["swarph", "llm", "cli", "mesh", "gemini", "claude", "deepseek"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Environment :: Console",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Operating System :: POSIX :: Linux",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "Topic :: Utilities",
]
dependencies = [
    # Phase 5 REPL exercises all five adapters; bumped to 0.5.0 for
    # OpenAI + Grok availability in /provider switch.
    "swarph-mesh>=0.5.0",
    "swarph-shared>=0.2.0",
    # Phase 7 spawn — cell.yaml parser. PyYAML 6.x is the standard.
    # Migrates to swarph-shared in v0.7+ per cell.yaml format-home
    # decision (substrate-doc R7 §11.1.7.4).
    "PyYAML>=6.0",
]

[project.urls]
Homepage = "https://github.com/darw007d/swarph-cli"
Source = "https://github.com/darw007d/swarph-cli"
Substrate = "https://github.com/darw007d/swarph-mesh"
Spec = "https://github.com/darw007d/hedge-fund-mcp/blob/main/research/swarph_cli/PLAN.md"

[project.optional-dependencies]
dev = ["pytest>=7.0"]

[project.scripts]
swarph = "swarph_cli.main:main"

[tool.setuptools.packages.find]
where = ["src"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-v --tb=short"
